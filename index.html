<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fantom Card</title>
<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: none;
}

.carousel {
  display: flex;
  width: 300%;
  height: 100%;
  transition: transform 0.4s ease;
}

.screen {
  width: 33.333%;
  height: 100%;
  flex-shrink: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  position: relative;
}

#screen-cover {
  background-image: url('cover.png');
}

#screen-rules {
  background-image: url('rules.png');
}

#screen-game {
  background-image: url('main_bg.png');
}

/* Плашка */
.swipe-hint {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  font-size: 13px;
  padding: 6px 12px;
  border-radius: 20px;
  pointer-events: none;
  backdrop-filter: blur(4px);
  white-space: nowrap;
}

/* Контент игрового экрана */
.game-content {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 10vh; /* Зафиксированная высота колоды */
}

/* Колода карт — ЗАФИКСИРОВАНО НАМЕРТВО */
.deck {
  position: relative;
  width: 66vw;
  aspect-ratio: 9 / 16;
  overflow: visible;
  margin: 0 auto;
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.deck-card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 16px;
  background-image: url('card_back.png');
  background-size: 100% 100%;
  background-position: center;
  background-repeat: no-repeat;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.deck-card:nth-child(1) { transform: translate(-8px, -8px) rotate(-3deg); }
.deck-card:nth-child(2) { transform: translate(-4px, -4px) rotate(-1.5deg); }
.deck-card:nth-child(3) { transform: translate(0px, 0px) rotate(0deg); }

/* Кнопка НАЧИНАЕМ */
.btn-start {
  width: 60vw;
  max-width: 280px;
  min-width: 200px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s ease, opacity 0.3s ease;
  touch-action: manipulation;
  margin-top: -10px;
}

.btn-start:active {
  transform: scale(0.93);
}

/* ИГРОВАЯ СЕТКА 5х5 (Изначально скрыта) */
.grid-container {
  display: none; /* Включается через JS */
  width: 92vw;   /* Занимает почти всю ширину экрана */
  max-width: 440px;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;      /* Аккуратные зазоры между картами */
  margin: 0 auto;
  position: relative;
}

/* Маленькие карточки в сетке */
.grid-card {
  width: 100%;
  aspect-ratio: 9 / 16; /* Железное сохранение пропорции 9:16 */
  border-radius: 6px;   /* Пропорционально уменьшенное скругление */
  background-image: url('card_back.png');
  background-size: 100% 100%;
  background-position: center;
  background-repeat: no-repeat;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  opacity: 0;
  transform: scale(0);  /* Изначально сжаты в центре для эффекта разлета */
}

/* Анимация разлета карт из центра */
@keyframes flyIn {
  0% {
    opacity: 0;
