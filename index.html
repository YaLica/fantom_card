<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fantom Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
        }

        /* === СВАЙП-КОНТЕЙНЕР === */
        .swiper {
            display: flex;
            width: 300vw;
            height: 100vh;
            transition: transform 0.4s ease;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        /* === ОБЛОЖКА И ПРАВИЛА === */
        .slide img.bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            animation: pulse-hint 2s infinite;
        }

        @keyframes pulse-hint {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* === ИГРОВОЕ ПОЛЕ === */
        .game-slide {
            background: url('main_bg.png') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- Колода на старте --- */
        .deck {
            position: relative;
            width: 120px;
            height: 170px;
            margin-bottom: 30px;
        }

        .deck img {
            position: absolute;
            width: 120px;
            height: 170px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .deck img:nth-child(1) { top: 0; left: 0; }
        .deck img:nth-child(2) { top: -4px; left: 4px; }
        .deck img:nth-child(3) { top: -8px; left: 8px; }

        /* --- Кнопка НАЧИНАЕМ --- */
        .btn-start {
            width: 220px;
            cursor: pointer;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- Сетка 5x5 --- */
        .grid-wrapper {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 10px;
        }

        .grid-wrapper.active {
            display: flex;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 360px;
        }

        .grid-card {
            aspect-ratio: 3/4;
            border-radius: 8px;
            cursor: pointer;
            animation: fly-in 0.5s ease forwards;
            opacity: 0;
            transform: scale(0.3) translateY(-200px);
        }

        .grid-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        @keyframes fly-in {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* --- Кнопка ПЕРЕМЕШАТЬ --- */
        .btn-mix {
            width: 200px;
            margin-top: 15px;
            cursor: pointer;
        }

        /* === ОВЕРЛЕЙ (Шаг 5) === */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .overlay.active {
            display: flex;
        }

        /* 3D карта в оверлее */
        .flip-container {
            perspective: 1200px;
            width: 240px;
            height: 340px;
            margin-bottom: 30px;
        }

        .flip-card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s ease;
        }

        .flip-card.flipped {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 14px;
            overflow: hidden;
        }

        .flip-card-front img,
        .flip-card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .flip-card-back {
            transform: rotateY(180deg);
        }

        /* Кнопка ГОТОВО */
        .btn-ready {
            width: 200px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.4s ease 0.8s;
        }

        .btn-ready.visible {
            opacity: 1;
        }

        /* Анимация вылета карты в центр */
        .grid-card.zoom-out {
            animation: zoom-to-center 0.4s ease forwards;
        }

        @keyframes zoom-to-center {
            to {
                opacity: 0;
                transform: scale(0.5);
            }
        }

        /* Открытая карта в сетке — показываем лицо */
        .grid-card.opened img {
            /* картинка уже заменена через JS */
        }

        /* === СКРЫТИЕ ЭЛЕМЕНТОВ === */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="swiper" id="swiper">
    <!-- Слайд 1: Обложка -->
    <div class="slide">
        <img class="bg" src="cover.png" alt="Cover">
        <div class="hint">листай влево ←</div>
    </div>

    <!-- Слайд 2: Правила -->
    <div class="slide">
        <img class="bg" src="rules.png" alt="Rules">
        <div class="hint">листай влево ←</div>
    </div>

    <!-- Слайд 3: Игра -->
    <div class="slide game-slide">
        <!-- Колода -->
        <div class="deck" id="deck">
            <img src="card_back.png" alt="card">
            <img src="card_back.png" alt="card">
            <img src="card_back.png" alt="card">
        </div>

        <!-- Кнопка НАЧИНАЕМ -->
        <img class="btn-start" id="btnStart" src="btn_start.png" alt="Начинаем">

        <!-- Сетка карт -->
        <div class="grid-wrapper" id="gridWrapper">
            <div class="grid" id="grid"></div>
            <img class="btn-mix" id="btnMix" src="btn_mix.png" alt="Перемешать">
        </div>
    </div>
</div>

<!-- Оверлей открытия карты -->
<div class="overlay" id="overlay">
    <div class="flip-container">
        <div class="flip-card" id="flipCard">
            <div class="flip-card-front">
                <img src="card_back.png" alt="Рубашка">
            </div>
            <div class="flip-card-back">
                <img id="flipFaceImg" src="" alt="Карта">
            </div>
        </div>
    </div>
    <img class="btn-ready" id="btnReady" src="btn_ready.png" alt="Готово">
</div>

<!-- Аудио -->
<audio id="sndStart" src="start.mp3" preload="auto"></audio>
<audio id="sndCardOpen" src="card_open.mp3" preload="auto"></audio>
<audio id="sndCardClose" src="card_close.mp3" preload="auto"></audio>
<audio id="sndShuffle" src="shuffle.mp3" preload="auto"></audio>

<script>
    // === СВАЙП ===
    const swiper = document.getElementById('swiper');
    let currentSlide = 0;
    let startX = 0;
    let isDragging = false;

    swiper.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        isDragging = true;
    });

    swiper.addEventListener('touchend', e => {
        if (!isDragging) return;
        isDragging = false;
        const diff = startX - e.changedTouches[0].clientX;
        if (diff > 50 && currentSlide < 2) {
            currentSlide++;
        } else if (diff < -50 && currentSlide > 0) {
            currentSlide--;
        }
        swiper.style.transform = `translateX(-${currentSlide * 100}vw)`;
    });

    // === ИГРОВАЯ ЛОГИКА ===
    const deck = document.getElementById('deck');
    const btnStart = document.getElementById('btnStart');
    const gridWrapper = document.getElementById('gridWrapper');
    const grid = document.getElementById('grid');
    const btnMix = document.getElementById('btnMix');
    const overlay = document.getElementById('overlay');
    const flipCard = document.getElementById('flipCard');
    const flipFaceImg = document.getElementById('flipFaceImg');
    const btnReady = document.getElementById('btnReady');

    const sndStart = document.getElementById('sndStart');
    const sndCardOpen = document.getElementById('sndCardOpen');
    const sndCardClose = document.getElementById('sndCardClose');
    const sndShuffle = document.getElementById('sndShuffle');

    // Массив карт 1-25
    let cardOrder = [];
    let openedCards = []; // индексы открытых ячеек
    let currentOpenedIndex = null; // какая ячейка сейчас открыта в оверлее

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function generateCardOrder() {
        cardOrder = shuffleArray([...Array(25)].map((_, i) => i + 1));
        openedCards = [];
    }

    function buildGrid() {
        grid.innerHTML = '';
        for (let i = 0; i < 25; i++) {
            const card = document.createElement('div');
            card.className = 'grid-card';
            card.style.animationDelay = `${i * 0.04}s`;
            card.dataset.index = i;

            const img = document.createElement('img');
            // Если карта уже была открыта — показываем лицо, иначе рубашку
            if (openedCards.includes(i)) {
                img.src = `card_${cardOrder[i]}.png`;
            } else {
                img.src = 'card_back.png';
            }

            card.appendChild(img);
            card.addEventListener('click', () => openCard(i));
            grid.appendChild(card);
        }
    }

    // === КНОПКА «НАЧИНАЕМ» ===
    btnStart.addEventListener('click', () => {
        sndStart.currentTime = 0;
        sndStart.play();

        deck.classList.add('hidden');
        btnStart.classList.add('hidden');

        generateCardOrder();
        buildGrid();
        gridWrapper.classList.add('active');
    });

    // === КНОПКА «ПЕРЕМЕШАТЬ» ===
    btnMix.addEventListener('click', () => {
        sndShuffle.currentTime = 0;
        sndShuffle.play();

        generateCardOrder();
        buildGrid();
    });

    // === ШАГ 5: ОТКРЫТИЕ КАРТЫ ===
    function openCard(index) {
        // Если карта уже открыта — не реагируем
        if (openedCards.includes(index)) return;

        currentOpenedIndex = index;

        // Устанавливаем лицо карты
        flipFaceImg.src = `card_${cardOrder[index]}.png`;

        // Сбрасываем состояние переворота
        flipCard.classList.remove('flipped');
        btnReady.classList.remove('visible');

        // Показываем оверлей
        overlay.classList.add('active');

        // Переворот через небольшую задержку
        setTimeout(() => {
            flipCard.classList.add('flipped');
            sndCardOpen.currentTime = 0;
            sndCardOpen.play();
        }, 300);

        // Показываем кнопку «ГОТОВО» после переворота
        setTimeout(() => {
            btnReady.classList.add('visible');
        }, 900);
    }

    // === ШАГ 6: КНОПКА «ГОТОВО!» (закрытие) ===
    btnReady.addEventListener('click', () => {
        sndCardClose.currentTime = 0;
        sndCardClose.play();

        // Запоминаем, что карта открыта
        openedCards.push(currentOpenedIndex);

        // Обновляем картинку в сетке — показываем лицо
        const gridCards = grid.querySelectorAll('.grid-card');
        const openedCardEl = gridCards[currentOpenedIndex];
        openedCardEl.querySelector('img').src = `card_${cardOrder[currentOpenedIndex]}.png`;
        openedCardEl.classList.add('opened');

        // Скрываем оверлей
        overlay.classList.remove('active');
        flipCard.classList.remove('flipped');
        btnReady.classList.remove('visible');

        currentOpenedIndex = null;
    });
</script>

</body>
</html>
