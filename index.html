<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fantom Card</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: none;
  background-color: #000;
}
.carousel {
  display: flex;
  width: 300%;
  height: 100%;
  transition: transform 0.4s ease;
}
.screen {
  width: 33.333%;
  height: 100%;
  flex-shrink: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  position: relative;
}
#screen-cover {
  background-image: url('cover.png');
}
#screen-rules {
  background-image: url('rules.png');
}
#screen-game {
  background-image: url('main_bg.png');
}
.swipe-hint {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  font-size: 13px;
  padding: 6px 12px;
  border-radius: 20px;
  pointer-events: none;
  backdrop-filter: blur(4px);
  white-space: nowrap;
}
.game-content {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 10vh;
}
.deck {
  position: relative;
  width: 66vw;
  aspect-ratio: 9 / 16;
  overflow: visible;
  margin: 0 auto;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.deck-card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 16px;
  background-image: url('card_back.png');
  background-size: 100% 100%;
  background-position: center;
  background-repeat: no-repeat;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.deck-card:nth-child(1) { transform: translate(-8px, -8px) rotate(-3deg); }
.deck-card:nth-child(2) { transform: translate(-4px, -4px) rotate(-1.5deg); }
.deck-card:nth-child(3) { transform: translate(0px, 0px) rotate(0deg); }
.btn-start {
  width: 60vw;
  max-width: 280px;
  min-width: 200px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s ease, opacity 0.3s ease;
  touch-action: manipulation;
  margin-top: -10px;
}
.btn-start:active {
  transform: scale(0.93);
}

.grid-container {
  display: none;
  width: 80vw;
  max-width: 340px;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  margin: 0 auto;
}
.grid-card {
  width: 100%;
  aspect-ratio: 9 / 16;
  border-radius: 5px;
  background-image: url('card_back.png');
  background-size: 100% 100%;
  background-position: center;
  background-repeat: no-repeat;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  opacity: 0;
}
@keyframes flyEffect {
  0% {
    opacity: 0;
    transform: scale(0.1) translateY(20vh) rotate(45deg);
  }
  100% {
    opacity: 1;
    transform: scale(1) translateY(0) rotate(0deg);
  }
}
.grid-card.animate {
  animation: flyEffect 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}

.btn-shuffle {
  display: none;
  width: 52vw;
  max-width: 240px;
  min-width: 170px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s ease, opacity 0.3s ease;
  touch-action: manipulation;
  margin-top: 8px; 
}
.btn-shuffle:active {
  transform: scale(0.93);
}

/* =========================================================
   МАГИЯ ДЛЯ КОМПЬЮТЕРОВ (Экраны шире 500px)
   На телефонах этот блок игнорируется, а на ПК делает красивое окошко
   ========================================================= */
@media (min-width: 501px) {
  html, body {
    background-color: #111; /* Темный красивый фон вокруг телефона на ПК */
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .carousel {
    width: 420px; /* Фиксированная ширина виртуального "смартфона" на ПК */
    height: 840px; /* Фиксированная высота */
    max-height: 90vh; /* Чтобы гарантированно влезало по высоте в любой монитор */
    aspect-ratio: 9 / 19;
    border-radius: 24px; /* Закругляем углы нашего "экрана" */
    box-shadow: 0 20px 60px rgba(0,0,0,0.8); /* Красивая тень */
    overflow: hidden;
  }
  .screen {
    width: 33.333%; /* Внутри окошка логика карусели остается идеальной */
    height: 100%;
  }
  /* Корректируем размеры элементов для фиксированного окна ПК */
  .deck { width: 250px; }
  .btn-start { width: 220px; }
  .grid-container { width: 340px; }
  .btn-shuffle { width: 200px; }
}
</style>
</head>
<body>

<div class="carousel" id="carousel">
  <div class="screen" id="screen-cover">
    <div class="swipe-hint">листай влево ←</div>
  </div>
  <div class="screen" id="screen-rules">
    <div class="swipe-hint">листай влево ←</div>
  </div>
  <div class="screen" id="screen-game">
    <div class="game-content" id="gameContent">
      <div class="deck" id="mainDeck">
        <div class="deck-card"></div>
        <div class="deck-card"></div>
        <div class="deck-card"></div>
      </div>
      <img class="btn-start" src="btn_start.png" id="btnStart" alt="Начинаем">
      <div class="grid-container" id="gridContainer"></div>
      <img class="btn-shuffle" src="btn_mix.png" id="btnShuffle" alt="Перемешать">
    </div>
  </div>
</div>

<audio id="soundStart" src="start.mp3" preload="auto"></audio>
<audio id="soundShuffle" src="shuffle.mp3" preload="auto"></audio>

<script>
const carousel = document.getElementById('carousel');
let current = 0;
const total = 3;
let startX = 0;
let startY = 0;
let isDragging = false;

function goTo(index) {
  if (index < 0) index = 0;
  if (index >= total) index = total - 1;
  current = index;
  carousel.style.transform = "translateX(-" + (current * 33.333) + "%)";
}

carousel.addEventListener('touchstart', function(e) {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
  isDragging = true;
});

carousel.addEventListener('touchend', function(e) {
  if (!isDragging) return;
  isDragging = false;
  var diffX = startX - e.changedTouches[0].clientX;
  var diffY = startY - e.changedTouches[0].clientY;
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
    if (diffX > 0) goTo(current + 1);
    else goTo(current - 1);
  }
});

carousel.addEventListener('mousedown', function(e) {
  startX = e.clientX;
  startY = e.clientY;
  isDragging = true;
});

carousel.addEventListener('mouseup', function(e) {
  if (!isDragging) return;
  isDragging = false;
  var diffX = startX - e.clientX;
  var diffY = startY - e.clientY;
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
    if (diffX > 0) goTo(current + 1);
    else goTo(current - 1);
  }
});

window.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight') {
    goTo(current + 1);
  } else if (e.key === 'ArrowLeft') {
    goTo(current - 1);
  }
});

const btnStart = document.getElementById('btnStart');
const mainDeck = document.getElementById('mainDeck');
const gridContainer = document.getElementById('gridContainer');
const btnShuffle = document.getElementById('btnShuffle');
const soundStart = document.getElementById('soundStart');
const soundShuffle = document.getElementById('soundShuffle');
const gameContent = document.getElementById('gameContent');

btnStart.addEventListener('click', function() {
  soundStart.currentTime = 0;
  soundStart.play();

  mainDeck.style.opacity = '0';
  mainDeck.style.transform = 'scale(0.8)';
  btnStart.style.opacity = '0';
  
  setTimeout(function() {
    mainDeck.style.display = 'none';
    btnStart.style.display = 'none';
    gameContent.style.paddingTop = '2vh';
    gridContainer.style.display = 'grid';
    btnShuffle.style.display = 'block';
    generateCards();
  }, 350);
});

btnShuffle.addEventListener('click', function() {
  soundShuffle.currentTime = 0;
  soundShuffle.play();
  
  const cards = gridContainer.querySelectorAll('.grid-card');
  cards.forEach(function(card) {
    card.classList.remove('animate');
    void card.offsetWidth;
  });
  
  cards.forEach(function(card, index) {
    setTimeout(function() {
      card.classList.add('animate');
    }, index * 12);
  });
});

function generateCards() {
  gridContainer.innerHTML = '';
  for (var i = 0; i < 25; i++) {
    (function(index) {
      var card = document.createElement('div');
      card.classList.add('grid-card');
      gridContainer.appendChild(card);
      setTimeout(function() {
        card.classList.add('animate');
      }, index * 15);
    })(i);
  }
}

goTo(0);
</script>
</body>
</html>
