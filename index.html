<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fantom Card</title>
<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background-color: #000;
}

/* Карусель */
.carousel {
  display: flex;
  width: 300%;
  height: 100%;
  transition: transform 0.4s ease;
  touch-action: pan-x; 
}

.screen {
  width: 33.333%;
  height: 100%;
  flex-shrink: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  position: relative;
}

#screen-cover {
  background-image: url('cover.png');
}

#screen-rules {
  background-image: url('rules.png');
}

#screen-game {
  background-image: url('main_bg.png');
}

/* Плашка */
.swipe-hint {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  font-size: 13px;
  padding: 6px 12px;
  border-radius: 20px;
  pointer-events: none;
  backdrop-filter: blur(4px);
  white-space: nowrap;
}

/* Контент игрового экрана */
.game-content {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 10vh;            /* Удерживаем сочный сдвиг всей группы вниз */
}

/* Колода карт — ИСПРАВЛЕНО: жесткая математическая пропорция 9:16 */
.deck {
  position: relative;
  width: 68vw;                  /* Оптимальная ширина, чтобы карты были крупными */
  height: 120.88vw;             /* Строго 68 * (16 / 9) — геометрия идеального вертикального прямоугольника */
  overflow: visible;
}

.deck-card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 20px;          /* Аккуратное скругление под формат 9:16 */
  background-image: url('card_back.png');
  background-size: 100% 100%;   /* Идеально заполняет выверенный контейнер */
  background-position: center;
  background-repeat: no-repeat;
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
}

/* Стопка — каждая карта чуть смещена */
.deck-card:nth-child(1) { transform: translate(-12px, -12px) rotate(-3deg); }
.deck-card:nth-child(2) { transform: translate(-6px, -6px) rotate(-1.5deg); }
.deck-card:nth-child(3) { transform: translate(0px, 0px) rotate(0deg); }

/* Кнопка */
.btn-start {
  width: 60vw;
  max-width: 280px;
  min-width: 200px;
  margin-top: 40px;             /* Приятный зазор до кнопки */
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s ease;
  touch-action: manipulation;
}

.btn-start:active {
  transform: scale(0.93);
}

</style>
</head>
<body>

<div class="carousel" id="carousel">

  <div class="screen" id="screen-cover">
    <div class="swipe-hint">листай влево ←</div>
  </div>

  <div class="screen" id="screen-rules">
    <div class="swipe-hint">листай влево ←</div>
  </div>

  <div class="screen" id="screen-game">
    <div class="game-content">

      <div class="deck">
        <div class="deck-card"></div>
        <div class="deck-card"></div>
        <div class="deck-card"></div>
      </div>

      <img class="btn-start" src="btn_start.png" id="btnStart" alt="Начинаем">

    </div>
  </div>

</div>

<audio id="soundStart" src="start.mp3" preload="auto"></audio>

<script>

const carousel = document.getElementById('carousel');

let current = 0;
const total = 3;
let startX = 0;
let startY = 0;
let isDragging = false;

function goTo(index) {
  if (index < 0) index = 0;
  if (index >= total) index = total - 1;
  current = index;
  carousel.style.transform = `translateX(-${current * 33.333}%)`;
}
