<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fantom Card</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: none;
  background-color: #000;
}
.carousel {
  display: flex;
  width: 300%;
  height: 100%;
  transition: transform 0.4s ease;
}
.screen {
  width: 33.333%;
  height: 100%;
  flex-shrink: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  position: relative;
}
#screen-cover {
  background-image: url('cover.png');
}
#screen-rules {
  background-image: url('rules.png');
}
#screen-game {
  background-image: url('main_bg.png');
}
.swipe-hint {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  font-size: 13px;
  padding: 6px 12px;
  border-radius: 20px;
  pointer-events: none;
  backdrop-filter: blur(4px);
  white-space: nowrap;
}
.game-content {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 10vh;
}
.deck {
  position: relative;
  width: 66vw;
  aspect-ratio: 9 / 16;
  overflow: visible;
  margin: 0 auto;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.deck-card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 16px;
  background-image: url('card_back.png');
  background-size: 100% 100%;
  background-position: center;
  background-repeat: no-repeat;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.deck-card:nth-child(1) { transform: translate(-8px, -8px) rotate(-3deg); }
.deck-card:nth-child(2) { transform: translate(-4px, -4px) rotate(-1.5deg); }
.deck-card:nth-child(3) { transform: translate(0px, 0px) rotate(0deg); }
.btn-start {
  width: 60vw;
  max-width: 280px;
  min-width: 200px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s ease, opacity 0.3s ease;
  touch-action: manipulation;
  margin-top: -10px;
}
.btn-start:active {
  transform: scale(0.93);
}
.grid-container {
  display: none;
  width: 86vw;
  max-width: 380px;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  margin: 0 auto;
}
.grid-card {
  width: 100%;
  aspect-ratio: 9 / 16;
  border-radius: 5px;
  background-image: url('card_back.png');
  background-size: 100% 100%;
  background-position: center;
  background-repeat: no-repeat;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  opacity: 0;
}
@keyframes flyEffect {
  0% {
    opacity: 0;
    transform: scale(0.1) translateY(20vh) rotate(45deg);
  }
  100% {
    opacity: 1;
    transform: scale(1) translateY(0) rotate(0deg);
  }
}
.grid-card.animate {
  animation: flyEffect 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}

/* Кнопка ПЕРЕМЕШАТЬ — Зазор ровно 6 пикселей под сеткой карт */
.btn-shuffle {
  display: none;
  width: 55vw;
  max-width: 260px;
  min-width: 180px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s ease, opacity 0.3s ease;
  touch-action: manipulation;
  margin-top: 6px; 
}
.btn-shuffle:active {
  transform: scale(0.93);
}
</style>
</head>
<body>

<div class="carousel" id="carousel">
  <div class="screen" id="screen-cover">
    <div class="swipe-hint">листай влево ←</div>
  </div>
  <div class="screen" id="screen-rules">
    <div class="swipe-hint
