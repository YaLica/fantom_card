<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>НАЖИМАЙ И ИГРАЙ! 🚀</title>

<!-- Open Graph для Telegram/WhatsApp -->
<meta property="og:title" content="👉 НАЖИМАЙ И ИГРАЙ! 🚀">
<meta property="og:description" content="Весёлая семейная игра с фантами для всей семьи!">
<meta property="og:image" content="cover.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="cover.png">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  img {
    -webkit-user-drag: none;
    user-drag: none;
    pointer-events: none;
  }

  /* ===== КАРУСЕЛЬ ===== */
  .carousel-wrapper {
    display: flex;
    width: 300%;
    height: 100%;
    transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    will-change: transform;
  }

  .slide {
    width: 33.333%;
    height: 100%;
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
  }

  .slide-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  /* ===== ПЛАШКА "ЛИСТАЙ ВЛЕВО" ===== */
  .swipe-hint {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(6px);
    border-radius: 20px;
    padding: 8px 16px;
    color: #fff;
    font-size: 14px;
    font-family: sans-serif;
    font-weight: 600;
    animation: pulse 1.8s ease-in-out infinite;
    z-index: 10;
    pointer-events: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.95); }
  }

  /* ===== ИГРОВОЕ ПОЛЕ ===== */
  #slide-game {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .game-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== СТАРТОВАЯ КОЛОДА ===== */
  #start-deck {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    transition: opacity 0.5s;
  }

  .deck-stack {
    position: relative;
    width: 160px;
    height: 220px;
  }

  .deck-stack img {
    position: absolute;
    width: 160px;
    height: 220px;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    pointer-events: none;
  }

  .deck-stack img:nth-child(1) { transform: rotate(-6deg) translateY(6px); }
  .deck-stack img:nth-child(2) { transform: rotate(3deg) translateY(3px); }
  .deck-stack img:nth-child(3) { transform: rotate(0deg) translateY(0px); }

  #btn-start {
    width: 200px;
    cursor: pointer;
    animation: float 2s ease-in-out infinite;
    pointer-events: all !important;
    display: block;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
  }

  /* ===== СЕТКА КАРТ ===== */
  #grid-container {
    position: relative;
    z-index: 2;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 0 8px;
  }

  #cards-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 400px;
  }

  .card-cell {
    aspect-ratio: 2/3;
    position: relative;
    cursor: pointer;
    perspective: 600px;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.4s;
    border-radius: 8px;
  }

  .card-front, .card-back-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 8px;
    overflow: hidden;
  }

  .card-front img,
  .card-back-face img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    display: block;
  }

  .card-front { transform: rotateY(180deg); }

  .card-cell.is-open .card-inner {
    transform: rotateY(180deg);
  }

  /* Анимация появления сетки */
  @keyframes cellAppear {
    from { opacity: 0; transform: scale(0.3); }
    to   { opacity: 1; transform: scale(1); }
  }

  .card-cell {
    opacity: 0;
    animation: none;
  }

  .card-cell.animate-in {
    animation: cellAppear 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  /* Шейк при перемешивании */
  @keyframes shake {
    0%   { transform: translate(0,0) rotate(0deg); }
    15%  { transform: translate(-6px, 3px) rotate(-3deg); }
    30%  { transform: translate(6px, -3px) rotate(3deg); }
    45%  { transform: translate(-4px, 4px) rotate(-2deg); }
    60%  { transform: translate(4px, -2px) rotate(2deg); }
    75%  { transform: translate(-2px, 2px) rotate(-1deg); }
    100% { transform: translate(0,0) rotate(0deg); }
  }

  #cards-grid.shaking {
    animation: shake 0.6s ease;
  }

  /* ===== КНОПКА ПЕРЕМЕШАТЬ ===== */
  #btn-mix {
    width: 180px;
    cursor: pointer;
    display: none;
    pointer-events: all !important;
  }

  /* ===== ОВЕРЛЕЙ С ОТКРЫТОЙ КАРТОЙ ===== */
  #card-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: rgba(0,0,0,0);
    pointer-events: none;
    opacity: 0;
    transition: background 0.3s, opacity 0.3s;
  }

  #card-overlay.active {
    background: rgba(0,0,0,0.7);
    opacity: 1;
    pointer-events: all;
  }

  #overlay-card-img {
    width: min(70vw, 280px);
    aspect-ratio: 2/3;
    object-fit: contain;
    border-radius: 16px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.7);
    transform: scale(0.3) rotateY(90deg);
    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }

  #card-overlay.active #overlay-card-img {
    transform: scale(1) rotateY(0deg);
  }

  #btn-ready {
    width: 180px;
    cursor: pointer;
    transform: translateY(20px);
    opacity: 0;
    transition: transform 0.4s 0.4s, opacity 0.4s 0.4s;
    pointer-events: all !important;
  }

  #card-overlay.active #btn-ready {
    transform: translateY(0);
    opacity: 1;
  }

</style>
</head>
<body>

<!-- ===== КАРУСЕЛЬ ===== -->
<div class="carousel-wrapper" id="carousel">

  <!-- Слайд 1: Обложка -->
  <div class="slide" id="slide-cover">
    <img class="slide-bg" src="cover.png" alt="Обложка">
    <div class="swipe-hint">Листай влево ➔</div>
  </div>

  <!-- Слайд 2: Правила -->
  <div class="slide" id="slide-rules">
    <img class="slide-bg" src="rules.png" alt="Правила">
    <div class="swipe-hint">Листай влево ➔</div>
  </div>

  <!-- Слайд 3: Игровое поле -->
  <div class="slide" id="slide-game">
    <img class="game-bg" src="fantom_cards/images/main_bg.png" alt="Фон">

    <!-- Стартовая колода -->
    <div id="start-deck">
      <div class="deck-stack">
        <img src="fantom_cards/images/card_back.png" alt="">
        <img src="fantom_cards/images/card_back.png" alt="">
        <img src="fantom_cards/images/card_back.png" alt="">
      </div>
      <img src="fantom_cards/images/btn_start.png" alt="Начинаем" id="btn-start">
    </div>

    <!-- Сетка + кнопка Перемешать -->
    <div id="grid-container">
      <div id="cards-grid"></div>
      <img src="fantom_cards/images/btn_mix.png" alt="Перемешать" id="btn-mix">
    </div>

  </div>
</div>

<!-- ===== ОВЕРЛЕЙ ОТКРЫТОЙ КАРТЫ ===== -->
<div id="card-overlay">
  <img id="overlay-card-img" src="" alt="Карта">
  <img src="fantom_cards/images/btn_ready.png" alt="Готово" id="btn-ready">
</div>

<!-- ===== ЗВУКИ ===== -->
<audio id="snd-start"      src="fantom_cards/audio/start.mp3"      preload="auto"></audio>
<audio id="snd-card-open"  src="fantom_cards/audio/card_open.mp3"  preload="auto"></audio>
<audio id="snd-card-close" src="fantom_cards/audio/card_close.mp3" preload="auto"></audio>
<audio id="snd-shuffle"    src="fantom_cards/audio/shuffle.mp3"    preload="auto"></audio>

<script>
// ================================================
//  ЗАЩИТА КОНТЕНТА
// ================================================
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('dragstart',   e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12') { e.preventDefault(); return false; }
  if (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) {
    e.preventDefault(); return false;
  }
  if (e.ctrlKey && ['U','u','S','s'].includes(e.key)) {
    e.preventDefault(); return false;
  }
});

// ================================================
//  КАРУСЕЛЬ
// ================================================
const carousel   = document.getElementById('carousel');
let currentSlide = 0;
const maxSlide   = 2;

let touchStartX = 0;
let touchStartY = 0;
let isSwiping   = false;

function goToSlide(n) {
  currentSlide = Math.max(0, Math.min(n, maxSlide));
  carousel.style.transform = `translateX(-${currentSlide * 33.333}%)`;
}

carousel.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isSwiping = true;
}, { passive: true });

carousel.addEventListener('touchend', e => {
  if (!isSwiping) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0 && currentSlide < maxSlide) goToSlide(currentSlide + 1);
    if (dx > 0 && currentSlide > 0)        goToSlide(currentSlide - 1);
  }
  isSwiping = false;
}, { passive: true });

// Клик по слайдам 0 и 1 — тоже листает
document.getElementById('slide-cover').addEventListener('click', () => {
  if (currentSlide === 0) goToSlide(1);
});
document.getElementById('slide-rules').addEventListener('click', () => {
  if (currentSlide === 1) goToSlide(2);
});

// ================================================
//  ИГРА: ДАННЫЕ
// ================================================
const TOTAL_CARDS = 25;
let cardOrder  = [];   // массив индексов карт [1..25] перемешанный
let openedSet  = new Set(); // индексы открытых позиций в сетке
let activeCell = null; // текущая нажатая ячейка

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function playSound(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.currentTime = 0;
  el.play().catch(() => {});
}

// ================================================
//  ПОСТРОИТЬ СЕТКУ
// ================================================
function buildGrid() {
  cardOrder = shuffleArray([...Array(TOTAL_CARDS)].map((_, i) => i + 1));
  openedSet.clear();

  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';

  for (let i = 0; i < TOTAL_CARDS; i++) {
    const cell = document.createElement('div');
    cell.className = 'card-cell';
    cell.dataset.pos = i;

    cell.innerHTML = `
      <div class="card-inner">
        <div class="card-back-face">
          <img src="fantom_cards/images/card_back.png" alt="">
        </div>
        <div class="card-front">
          <img src="fantom_cards/images/card_${cardOrder[i]}.png" alt="Карта ${cardOrder[i]}">
        </div>
      </div>
    `;

    cell.addEventListener('click', onCardClick);
    grid.appendChild(cell);
  }
}

// ================================================
//  АНИМАЦИЯ ПОЯВЛЕНИЯ СЕТКИ
// ================================================
function animateGridIn() {
  const cells = document.querySelectorAll('.card-cell');
  cells.forEach((cell, i) => {
    cell.style.animationDelay = `${i * 30}ms`;
    cell.classList.add('animate-in');
  });
}

// ================================================
//  КНОПКА "НАЧИНАЕМ"
// ================================================
document.getElementById('btn-start').addEventListener('click', () => {
  const deck        = document.getElementById('start-deck');
  const gridWrapper = document.getElementById('grid-container');
  const btnMix      = document.getElementById('btn-mix');

  playSound('snd-start');

  // Скрываем колоду
  deck.style.opacity = '0';
  deck.style.pointerEvents = 'none';

  setTimeout(() => {
    deck.style.display = 'none';
    buildGrid();
    gridWrapper.style.display = 'flex';
    btnMix.style.display = 'block';

    // Запускаем анимацию через 1 кадр
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        animateGridIn();
      });
    });
  }, 500);
});

// ================================================
//  КЛИК ПО КАРТЕ
// ================================================
function onCardClick(e) {
  const cell = e.currentTarget;
  const pos  = parseInt(cell.dataset.pos);

  // Если карта уже открыта — игнорируем
  if (openedSet.has(pos)) return;
  // Если оверлей уже активен — игнорируем
  if (document.getElementById('card-overlay').classList.contains('active')) return;

  activeCell = cell;
  const cardNum = cardOrder[pos];

  playSound('snd-card-open');

  // Показываем оверлей
  const overlay = document.getElementById('card-overlay');
  const img     = document.getElementById('overlay-card-img');
  img.src = `fantom_cards/images/card_${cardNum}.png`;

  overlay.classList.add('active');
}

// ================================================
//  КНОПКА "ГОТОВО"
// ================================================
document.getElementById('btn-ready').addEventListener('click', () => {
  if (!activeCell) return;

  playSound('snd-card-close');

  const overlay = document.getElementById('card-overlay');
  const pos     = parseInt(activeCell.dataset.pos);

  // Закрываем оверлей
  overlay.classList.remove('active');

  // Открываем карту в сетке после окончания анимации оверлея
  setTimeout(() => {
    openedSet.add(pos);
    activeCell.classList.add('is-open');
    activeCell = null;
  }, 400);
});

// ================================================
//  КНОПКА "ПЕРЕМЕШАТЬ"
// ================================================
document.getElementById('btn-mix').addEventListener('click', () => {
  const grid = document.getElementById('cards-grid');

  playSound('snd-shuffle');

  // Шейк-анимация
  grid.classList.add('shaking');

  setTimeout(() => {
    grid.classList.remove('shaking');
    // Пересобираем сетку
    buildGrid();
    // Сброс анимаций
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        animateGridIn();
      });
    });
  }, 700);
});

// ================================================
//  СТАРТ
// ================================================
goToSlide(0);
</script>
</body>
</html>
