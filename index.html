<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Фантом Карты</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    #app {
      width: 390px;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .screen {
      display: none;
      width: 100%;
      min-height: 100vh;
      position: relative;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .screen.active {
      display: flex;
    }

    .bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 20px;
    }

    /* === ЭКРАН 1: ОБЛОЖКА === */
    #screen-cover .cover-img {
      width: 100%;
      max-width: 350px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    #screen-cover .cover-img:hover {
      transform: scale(1.02);
    }

    /* === ЭКРАН 2: ПРАВИЛА === */
    #screen-rules .rules-img {
      width: 100%;
      max-width: 350px;
      margin-bottom: 30px;
    }

    /* === ЭКРАН 3: ИГРА === */
    #screen-game .cards-area {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 20px 10px;
      max-width: 390px;
    }

    .card-wrapper {
      width: 100px;
      height: 140px;
      perspective: 600px;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s;
    }

    .card-wrapper.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 8px;
      overflow: hidden;
    }

    .card-front img, .card-back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    /* === КНОПКИ === */
    .btn-img {
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      max-width: 200px;
      margin: 10px;
    }

    .btn-img:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .btn-img:active {
      transform: scale(0.97);
    }

    .buttons-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ЭКРАН 1: ОБЛОЖКА -->
  <div id="screen-cover" class="screen active">
    <img class="bg" src="main_bg.png" alt="">
    <div class="content">
      <img class="cover-img" src="cover.png" alt="Обложка" onclick="showRules()">
    </div>
  </div>

  <!-- ЭКРАН 2: ПРАВИЛА -->
  <div id="screen-rules" class="screen">
    <img class="bg" src="main_bg.png" alt="">
    <div class="content">
      <img class="rules-img" src="rules.png" alt="Правила">
      <div class="buttons-row">
        <img class="btn-img" src="btn_start.png" alt="Начать" onclick="startGame()">
      </div>
    </div>
  </div>

  <!-- ЭКРАН 3: ИГРА -->
  <div id="screen-game" class="screen">
    <img class="bg" src="main_bg.png" alt="">
    <div class="content">
      <div class="cards-area" id="cardsArea"></div>
      <div class="buttons-row">
        <img class="btn-img" src="btn_mix.png" alt="Перемешать" onclick="shuffleCards()">
        <img class="btn-img" src="btn_ready.png" alt="Готово" onclick="showCover()">
      </div>
    </div>
  </div>

</div>

<!-- АУДИО -->
<audio id="audio-start" src="start.mp3"></audio>
<audio id="audio-open" src="card_open.mp3"></audio>
<audio id="audio-close" src="card_close.mp3"></audio>
<audio id="audio-shuffle" src="shuffle.mp3"></audio>

<script>
  const TOTAL_CARDS = 25;

  function playSound(id) {
    const audio = document.getElementById(id);
    if (audio) {
      audio.currentTime = 0;
      audio.play();
    }
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showRules() {
    playSound('audio-start');
    showScreen('screen-rules');
  }

  function showCover() {
    showScreen('screen-cover');
  }

  function startGame() {
    buildCards();
    showScreen('screen-game');
  }

  function shuffleCards() {
    playSound('audio-shuffle');
    // Закрываем все карты
    document.querySelectorAll('.card-wrapper').forEach(c => c.classList.remove('flipped'));
    // Перемешиваем
    buildCards();
  }

  function buildCards() {
    const area = document.getElementById('cardsArea');
    area.innerHTML = '';

    // Создаём массив [1..25] и перемешиваем
    let nums = Array.from({length: TOTAL_CARDS}, (_, i) => i + 1);
    for (let i = nums.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [nums[i], nums[j]] = [nums[j], nums[i]];
    }

    nums.forEach(n => {
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';

      wrapper.innerHTML = `
        <div class="card-inner">
          <div class="card-front">
            <img src="card_back.png" alt="back">
          </div>
          <div class="card-back">
            <img src="card_${n}.png" alt="card ${n}">
          </div>
        </div>
      `;

      wrapper.addEventListener('click', () => {
        const isFlipped = wrapper.classList.contains('flipped');
        if (!isFlipped) {
          playSound('audio-open');
        } else {
          playSound('audio-close');
        }
        wrapper.classList.toggle('flipped');
      });

      area.appendChild(wrapper);
    });
  }
</script>

</body>
</html>
