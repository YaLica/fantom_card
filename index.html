

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fantom Card</title>
<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: none;
}

.carousel {
  display: flex;
  width: 300%;
  height: 100%;
  transition: transform 0.4s ease;
}

.screen {
  width: 33.333%;
  height: 100%;
  flex-shrink: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  position: relative;
}

#screen-cover {
  background-image: url('cover.png');
}

#screen-rules {
  background-image: url('rules.png');
}

#screen-game {
  background-image: url('main_bg.png');
}

/* Плашка */
.swipe-hint {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  font-size: 13px;
  padding: 6px 12px;
  border-radius: 20px;
  pointer-events: none;
  backdrop-filter: blur(4px);
  white-space: nowrap;
}

/* Контент игрового экрана */
.game-content {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Колода карт — ИСПРАВЛЕНО: увеличен размер, строго по центру с минимальными отступами */
.deck {
  position: relative;
  width: 78vw;          /* Колода стала заметно крупнее на экране смартфона */
  height: 109.2vw;      /* Пропорция 1:1.4 для идеального сохранения формы карт */
  max-width: 400px;     /* Ограничение для больших экранов */
  max-height: 560px;
  overflow: visible;
  padding: 0;
  margin: 0 auto;       /* Центрирование по горизонтали */
}

.deck-card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 16px;
  background-image: url('card_back.png');
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5); /* Сделали тень еще глубже для объема */
}

/* Стопка — каждая карта чуть смещена */
.deck-card:nth-child(1) { transform: translate(-10px, -10px) rotate(-3deg); }
.deck-card:nth-child(2) { transform: translate(-5px, -5px) rotate(-1.5deg); }
.deck-card:nth-child(3) { transform: translate(0px, 0px) rotate(0deg); }

/* Кнопка — ИСПРАВЛЕНО: размер прежний, но добавили безопасный отступ сверху */
.btn-start {
  width: 60vw;
  max-width: 280px;
  min-width: 200px;
  margin-top: 40px;     /* Аккуратно отодвинули кнопку вниз от большой колоды */
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s ease;
  touch-action: manipulation;
}

.btn-start:active {
  transform: scale(0.93);
}

</style>
</head>
<body>

<div class="carousel" id="carousel">

  <div class="screen" id="screen-cover">
    <div class="swipe-hint">листай влево ←</div>
  </div>

  <div class="screen" id="screen-rules">
    <div class="swipe-hint">листай влево ←</div>
  </div>

  <div class="screen" id="screen-game">
    <div class="game-content">

      <div class="deck">
        <div class="deck-card"></div>
        <div class="deck-card"></div>
        <div class="deck-card"></div>
      </div>

      <img class="btn-start" src="btn_start.png" id="btnStart" alt="Начинаем">

    </div>
  </div>

</div>

<audio id="soundStart" src="start.mp3" preload="auto"></audio>

<script>

const carousel = document.getElementById('carousel');

let current = 0;
const total = 3;
let startX = 0;
let startY = 0;
let isDragging = false;

function goTo(index) {
  if (index < 0) index = 0;
  if (index >= total) index = total - 1;
  current = index;
  carousel.style.transform = `translateX(-${current * 33.333}%)`;
}

// Touch
carousel.addEventListener('touchstart', (e) => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
  isDragging = true;
}, { passive: true });

carousel.addEventListener('touchend', (e) => {
  if (!isDragging) return;
  isDragging = false;
  const diffX = startX - e.changedTouches[0].clientX;
  const diffY = startY - e.changedTouches[0].clientY;
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
    if (diffX > 0) goTo(current + 1);
